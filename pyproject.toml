# Virtual workspace root — no package of its own, just declares the
# workspace members and shared tooling config. Run `uv sync` from this
# directory to install everything (shared lib + every agent + dev tools).

[tool.uv.workspace]
members = ["shared", "agents/*"]

# Route the `namiview-shared` dep to the workspace copy rather than PyPI.
[tool.uv.sources]
namiview-shared = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[tool.ruff]
line-length = 100
target-version = "py313"
src = ["shared/src", "agents/triage/src"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]

# Tell isort which packages are ours so it groups them separately from
# third-party. Without this, `namiview_triage` under agents/triage/src/
# gets misclassified on non-editable installs (e.g. CI, Docker).
[tool.ruff.lint.isort]
known-first-party = ["namiview_shared", "namiview_triage"]

[tool.pytest.ini_options]
testpaths = ["shared/tests", "agents/triage/tests"]
# `importlib` mode lets us have identically-named test modules
# (e.g. `test_smoke.py`) across multiple workspace packages without
# pytest getting confused by sys.modules collisions.
addopts = ["--strict-markers", "-ra", "--import-mode=importlib"]
